packages:
  - packages/*
  - examples/*
  - registry/software/*
  - registry/agent/*
  - registry/file-system/*
  - registry/tool/*
  # Stimulir-flavored thin wrappers — additive alongside upstream, never
  # modify @rivet-dev/* packages so `pnpm run sync:upstream` stays clean.
  - registry/stimulir/*

ignoredBuiltDependencies:
  - '@clerk/shared'
  - '@parcel/watcher'
  - browser-tabs-lock
  - core-js

onlyBuiltDependencies:
  - '@biomejs/biome'
  - better-sqlite3
  - bun
  - cbor-extract
  - esbuild
  - lefthook
  - sharp
